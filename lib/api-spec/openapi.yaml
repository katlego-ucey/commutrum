openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: Commutrum — JSE factor research engine API
servers:
  - url: /api/v1
    description: Versioned API base path
tags:
  - name: health
    description: Health check
  - name: universe
    description: Module 00 — Universe screening
  - name: data
    description: Module 01 — Point-in-time data pipeline
  - name: factors
    description: Module 02 — Baseline factors
  - name: signals
    description: Module 03 — Signal construction
  - name: orthogonality
    description: Module 04 — Orthogonality engine
  - name: research
    description: Module 05 — Composite research engine
  - name: probability
    description: Module 06 — Probability calibration
  - name: portfolio
    description: Module 07 — Portfolio construction
  - name: execution
    description: Module 08 — Execution model
  - name: backtest
    description: Module 09 — Walk-forward validation
  - name: monitoring
    description: Module 10 — Continuous monitoring
  - name: decay
    description: Module 11 — Decay detection
  - name: admission
    description: Module 12 — Factor admission protocol
  - name: registry
    description: Module 13 — Hypothesis and model registry

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Module 00 — Universe ─────────────────────────────────────────────────
  /universe:
    get:
      operationId: getUniverse
      tags: [universe]
      summary: Get investable universe for a date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Universe snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniverseListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /universe/{ticker}/screen-status:
    get:
      operationId: getTickerScreenStatus
      tags: [universe]
      summary: Get screen status for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Screen status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Module 01 — Data ─────────────────────────────────────────────────────
  /data/prices/{ticker}:
    get:
      operationId: getTickerPrices
      tags: [data]
      summary: Get daily OHLCV prices for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
        - $ref: "#/components/parameters/fromDate"
        - $ref: "#/components/parameters/toDate"
      responses:
        "200":
          description: Price series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceSeriesResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /data/fundamentals/{ticker}:
    get:
      operationId: getTickerFundamentals
      tags: [data]
      summary: Get point-in-time fundamentals for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Fundamentals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundamentalsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /data/events/{ticker}:
    get:
      operationId: getTickerEvents
      tags: [data]
      summary: Get SENS announcements and corporate events for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
        - $ref: "#/components/parameters/fromDate"
        - $ref: "#/components/parameters/toDate"
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsResponse"

  /data/quality/{ticker}:
    get:
      operationId: getTickerDataQuality
      tags: [data]
      summary: Get data quality summary for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
      responses:
        "200":
          description: Data quality summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataQualityResponse"

  # ── Module 02 — Factors ──────────────────────────────────────────────────
  /factors/{ticker}/raw:
    get:
      operationId: getTickerFactorRaw
      tags: [factors]
      summary: Get raw factor values for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Raw factor values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactorRawValuesResponse"

  /factors/definitions:
    get:
      operationId: getFactorDefinitions
      tags: [factors]
      summary: Get all active factor definitions
      responses:
        "200":
          description: Factor definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactorDefinitionsResponse"

  # ── Module 03 — Signals ──────────────────────────────────────────────────
  /signals/{ticker}:
    get:
      operationId: getTickerSignals
      tags: [signals]
      summary: Get standardized signals for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalsResponse"

  /signals/sector-stats:
    get:
      operationId: getSignalSectorStats
      tags: [signals]
      summary: Get cross-sectional signal statistics by sector
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sector stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorStatsResponse"

  # ── Module 04 — Orthogonality ────────────────────────────────────────────
  /orthogonality/correlation-matrix:
    get:
      operationId: getCorrelationMatrix
      tags: [orthogonality]
      summary: Get pairwise factor correlation matrix
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Correlation matrix
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorrelationMatrixResponse"

  /orthogonality/clusters:
    get:
      operationId: getSignalClusters
      tags: [orthogonality]
      summary: Get signal clusters and representatives
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Signal clusters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalClustersResponse"

  # ── Module 05 — Composite ────────────────────────────────────────────────
  /research/{ticker}:
    get:
      operationId: getResearchComposite
      tags: [research]
      summary: Get composite score with factor attribution for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Composite research result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompositeResearchResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /regime/current:
    get:
      operationId: getCurrentRegime
      tags: [research]
      summary: Get current market regime classification
      responses:
        "200":
          description: Current regime
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegimeResponse"

  # ── Module 06 — Probability ──────────────────────────────────────────────
  /probability/{ticker}:
    get:
      operationId: getTickerProbability
      tags: [probability]
      summary: Get calibrated probability output for a ticker
      parameters:
        - $ref: "#/components/parameters/ticker"
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Probability output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbabilityResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /calibration/reliability-diagram:
    get:
      operationId: getReliabilityDiagram
      tags: [probability]
      summary: Get reliability diagram data for the active calibration model
      responses:
        "200":
          description: Reliability diagram
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReliabilityDiagramResponse"

  # ── Module 07 — Portfolio ────────────────────────────────────────────────
  /portfolio/current:
    get:
      operationId: getCurrentPortfolio
      tags: [portfolio]
      summary: Get current portfolio holdings
      responses:
        "200":
          description: Current portfolio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResponse"

  /portfolio/history:
    get:
      operationId: getPortfolioHistory
      tags: [portfolio]
      summary: Get historical portfolio holdings
      parameters:
        - $ref: "#/components/parameters/fromDate"
        - $ref: "#/components/parameters/toDate"
      responses:
        "200":
          description: Portfolio history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioHistoryResponse"

  /portfolio/rebalance:
    post:
      operationId: simulateRebalance
      tags: [portfolio]
      summary: Simulate a portfolio rebalance (does not place real trades)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RebalanceRequest"
      responses:
        "200":
          description: Rebalance simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebalanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Module 08 — Execution ────────────────────────────────────────────────
  /execution/cost-model:
    get:
      operationId: getCostModel
      tags: [execution]
      summary: Get current cost model parameters
      responses:
        "200":
          description: Cost model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostModelResponse"

  /execution/estimate-shortfall:
    post:
      operationId: estimateShortfall
      tags: [execution]
      summary: Estimate implementation shortfall for a trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShortfallRequest"
      responses:
        "200":
          description: Shortfall estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortfallResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Module 09 — Backtest ─────────────────────────────────────────────────
  /backtest/runs:
    get:
      operationId: getBacktestRuns
      tags: [backtest]
      summary: List all backtest runs
      responses:
        "200":
          description: Backtest runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunsResponse"

  /backtest/results/{runId}:
    get:
      operationId: getBacktestResults
      tags: [backtest]
      summary: Get results for a specific backtest run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backtest results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResultsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /backtest/benchmark-comparison:
    get:
      operationId: getBacktestBenchmarkComparison
      tags: [backtest]
      summary: Get benchmark comparison across all completed backtest runs
      responses:
        "200":
          description: Benchmark comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkComparisonResponse"

  # ── Module 10 — Monitoring ───────────────────────────────────────────────
  /monitoring/metrics:
    get:
      operationId: getMonitoringMetrics
      tags: [monitoring]
      summary: Get rolling monitoring metrics
      parameters:
        - name: factorId
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/fromDate"
        - $ref: "#/components/parameters/toDate"
      responses:
        "200":
          description: Monitoring metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringMetricsResponse"

  /monitoring/alerts:
    get:
      operationId: getMonitoringAlerts
      tags: [monitoring]
      summary: Get open monitoring alerts
      parameters:
        - name: acknowledged
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"

  /monitoring/alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeMonitoringAlert
      tags: [monitoring]
      summary: Acknowledge a monitoring alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeRequest"
      responses:
        "200":
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Module 11 — Decay ────────────────────────────────────────────────────
  /decay/alerts:
    get:
      operationId: getDecayAlerts
      tags: [decay]
      summary: Get open decay alerts
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Decay alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecayAlertsResponse"

  /decay/alerts/{id}/investigate:
    post:
      operationId: investigateDecayAlert
      tags: [decay]
      summary: Log investigation findings for a decay alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestigationRequest"
      responses:
        "200":
          description: Investigation logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestigationResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Module 12 — Admission ────────────────────────────────────────────────
  /factor-candidates:
    get:
      operationId: getFactorCandidates
      tags: [admission]
      summary: List all factor candidates
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Factor candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactorCandidatesResponse"

  /factor-candidates/{id}/gate-results:
    get:
      operationId: getFactorCandidateGateResults
      tags: [admission]
      summary: Get all gate results for a factor candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gate results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateResultsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /factor-candidates/{id}/decision:
    post:
      operationId: recordFactorCandidateDecision
      tags: [admission]
      summary: Record admission decision for a factor candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdmissionDecisionRequest"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdmissionDecisionResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Module 13 — Registry ─────────────────────────────────────────────────
  /registry/factors:
    get:
      operationId: getRegistryFactors
      tags: [registry]
      summary: List all factors in the hypothesis registry
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Registry factors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistryFactorsResponse"

  /registry/factors/{id}:
    get:
      operationId: getRegistryFactor
      tags: [registry]
      summary: Get full detail for a registry factor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Registry factor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistryFactorDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /registry/audit-log:
    get:
      operationId: getRegistryAuditLog
      tags: [registry]
      summary: Get full audit log
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: entityId
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"

  /registry/factors/{id}/transition:
    post:
      operationId: transitionRegistryFactor
      tags: [registry]
      summary: Transition a factor to a new lifecycle status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifecycleTransitionRequest"
      responses:
        "200":
          description: Transition recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifecycleTransitionResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  parameters:
    ticker:
      name: ticker
      in: path
      required: true
      schema:
        type: string
    fromDate:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date
    toDate:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date
    cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 100
        maximum: 500

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    Meta:
      type: object
      properties:
        as_of:
          type: string
          format: date
        generated_at:
          type: string
          format: date-time
      required: [generated_at]

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
      required: [error]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    UniverseEntry:
      type: object
      properties:
        ticker:
          type: string
        companyName:
          type: string
        sector:
          type: string
        marketCapZar:
          type: number
        adtv20d:
          type: number
        isActive:
          type: boolean
      required: [ticker, isActive]

    UniverseListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UniverseEntry"
        meta:
          $ref: "#/components/schemas/Meta"
        nextCursor:
          type: string
      required: [data, meta]

    ScreenStatusResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            ticker:
              type: string
            asOf:
              type: string
              format: date
            passes:
              type: boolean
            filters:
              type: object
              additionalProperties:
                type: boolean
          required: [ticker, passes]
        meta:
          $ref: "#/components/schemas/Meta"
      required: [data, meta]

    PricePoint:
      type: object
      properties:
        date:
          type: string
          format: date
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
        vwap:
          type: number
      required: [date, close]

    PriceSeriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PricePoint"
        meta:
          $ref: "#/components/schemas/Meta"
      required: [data, meta]

    FundamentalsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            ticker:
              type: string
            periodEndDate:
              type: string
              format: date
            publicationDate:
              type: string
              format: date
            revenue:
              type: number
            netIncome:
              type: number
            totalAssets:
              type: number
            equity:
              type: number
            eps:
              type: number
            roe:
              type: number
            roa:
              type: number
          required: [ticker, periodEndDate, publicationDate]
        meta:
          $ref: "#/components/schemas/Meta"
      required: [data, meta]

    EventsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              category:
                type: string
              headline:
                type: string
            required: [date]
        meta:
          $ref: "#/components/schemas/Meta"
      required: [data, meta]

    DataQualityResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            ticker:
              type: string
            overallScore:
              type: number
            checks:
              type: array
              items:
                type: object
                properties:
                  checkType:
                    type: string
                  passed:
                    type: boolean
                  message:
                    type: string
                required: [checkType, passed]
          required: [ticker, overallScore]
        meta:
          $ref: "#/components/schemas/Meta"
      required: [data, meta]

    FactorRawValue:
      type: object
      properties:
        factorId:
          type: string
        factorName:
          type: string
        rawValue:
          type: number
        asOfDate:
          type: string
          format: date
        publicationDate:
          type: string
          format: date
      required: [factorId, asOfDate, publicationDate]

    FactorRawValuesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FactorRawValue"
        meta:
          $ref: "#/components/schemas/Meta"
      required: [data, meta]

    FactorDefinition:
      type: object
      properties:
        factorId:
          type: string
        factorName:
          type: string
        description:
          type: string
        mechanism:
          type: string
        decayHorizon:
          type: string
        formulaVersion:
          type: integer
        effectiveFrom:
          type: string
          format: date
      required: [factorId, factorName, formulaVersion, effectiveFrom]

    FactorDefinitionsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FactorDefinition"
        meta:
          $ref: "#/components/schemas/Meta"
      required: [data, meta]

    SignalEntry:
      type: object
      properties:
        factorId:
          type: string
        rawValue:
          type: number
        sectorRelative:

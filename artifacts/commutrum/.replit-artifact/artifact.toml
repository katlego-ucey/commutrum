kind = "web"
previewPath = "/"
title = "Commutrum"
version = "1.0.0"
id = "artifacts/commutrum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24915

[services.development]
run = "pnpm --filter @workspace/commutrum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/commutrum", "run", "build" ]
publicDir = "artifacts/commutrum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24915"
BASE_PATH = "/"

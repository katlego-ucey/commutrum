kind = "web"
previewPath = "/"
title = "Commutrum"
version = "1.0.0"
id = "commutrum-jse-factor-engine"

[[services]]
localPort = 3000
name = "Commutrum"
paths = ["/"]

[services.development]
run = "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/commutrum run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/commutrum", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
PORT = "3000"
BASE_PATH = "/"

[services.production.serve]
type = "static"
directory = "artifacts/commutrum/dist/public"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test --if-present

      - name: Leakage / look-ahead tests
        run: pnpm run test:leakage --if-present

      - name: Build
        run: pnpm run build

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets in source
        run: |
          if grep -r --include="*.ts" --include="*.js" --include="*.json" \
            -E "(password|secret|api_key|apikey|token)\s*=\s*['\"][^'\"]{8,}" \
            --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "Potential hardcoded secret detected — use environment variables"
            exit 1
          fi
          echo "No hardcoded secrets found"

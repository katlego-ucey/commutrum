name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NOTE: This workflow is in the documentation phase.
# The typecheck, test, and build jobs below are commented out until
# the pnpm workspace scaffold and first module code are committed.
# Restore them by following ROADMAP.md Phase 1, Sprint 1.

jobs:
  # ─────────────────────────────────────────────────────────────
  # Documentation structure validation
  # Runs now. Ensures every module doc folder exists and is non-empty.
  # ─────────────────────────────────────────────────────────────
  validate-docs:
    name: Validate documentation structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required module docs exist
        run: |
          set -e
          REQUIRED_DOCS=(
            "docs/00-universe-screening/README.md"
            "docs/01-data-pipeline/README.md"
            "docs/02-baseline-factors/README.md"
            "docs/03-signal-construction/README.md"
            "docs/04-orthogonality-engine/README.md"
            "docs/05-composite-research-engine/README.md"
            "docs/06-probability-calibration/README.md"
            "docs/07-portfolio-construction/README.md"
            "docs/08-execution-model/README.md"
            "docs/09-walk-forward-validation/README.md"
            "docs/10-continuous-monitoring/README.md"
            "docs/11-decay-detection/README.md"
            "docs/12-factor-admission-protocol/README.md"
            "docs/13-hypothesis-model-registry/README.md"
            "docs/14-database-schema/README.md"
            "docs/15-api-specification/README.md"
            "docs/16-frontend-dashboards/README.md"
            "docs/17-testing-deployment/README.md"
            "docs/18-ai-agent-development-playbook/README.md"
            "AUDIT.md"
            "ROADMAP.md"
          )
          MISSING=0
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ ! -s "$doc" ]; then
              echo "MISSING or EMPTY: $doc"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "One or more required documentation files are missing or empty."
            exit 1
          fi
          echo "All required documentation files present."

  # ─────────────────────────────────────────────────────────────
  # Secret scanning
  # Scans TypeScript/JavaScript/JSON source files for hardcoded secrets.
  # Uses targeted patterns to avoid false positives on test fixtures.
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect hardcoded secrets in source
        run: |
          # Scan for patterns that strongly indicate real secrets:
          # - Variable assignment with a value of 20+ characters (long enough to be a real key)
          # - Excludes test/, __tests__/, *.test.ts, *.spec.ts files
          # - Excludes mock data and fixture files
          if grep -r \
            --include="*.ts" --include="*.js" --include="*.json" \
            --exclude="*.test.ts" --exclude="*.spec.ts" \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude-dir=__tests__ --exclude-dir=__mocks__ \
            --exclude-dir=fixtures --exclude-dir=test \
            -E "(EODHD_API_KEY|DATABASE_URL|JWT_SECRET|API_KEY|SECRET_KEY)\s*=\s*['\"][A-Za-z0-9+/=._-]{20,}['\"]" \
            .; then
            echo ""
            echo "Potential hardcoded secret detected."
            echo "Use environment variables via process.env — never commit real credentials."
            exit 1
          fi
          echo "No hardcoded secrets found."

  # ─────────────────────────────────────────────────────────────
  # Code quality (RESTORE when first code is committed)
  # Follow ROADMAP.md Phase 1, Sprint 1 to add workspace scaffold,
  # then uncomment this job and remove the 'if: false' line.
  # ─────────────────────────────────────────────────────────────
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    if: false  # Remove this line when pnpm workspace scaffold is committed
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test --if-present

      - name: Leakage / look-ahead bias tests
        run: pnpm run test:leakage --if-present

      - name: Build
        run: pnpm run build
